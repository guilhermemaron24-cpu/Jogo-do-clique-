<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus Prism - Clique Relâmpago</title>
    <link rel="stylesheet" href="style.css">
    <!-- small inline favicon to avoid 404 for /favicon.ico requests -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 16 16%22><text x=%222%22 y=%2212%22 font-size=%2214%22>⚡</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="game-container">
        <header class="game-header">
            <h1 class="game-title">NEXUS PRISM</h1>
            <div class="top-nav">
                <button id="achievements-nav-btn" class="nav-btn" title="Conquistas">🏆</button>
                <button id="shop-nav-btn" class="nav-btn" title="Loja">⚡</button>
            </div>
        </header>

        <div class="hud">
            <div class="hud-item">
                <span class="hud-label">Moedas</span>
                <span id="energy-display-hud" class="hud-value">0</span>
            </div>
            <div class="hud-item">
                <span class="hud-label">Energia</span>
                <span id="score" class="hud-value">0</span>
            </div>
            <div class="hud-item">
                <span class="hud-label">Setor</span>
                <span id="sector" class="hud-value">1</span>
            </div>
            <div class="hud-item">
                <span class="hud-label">Tempo</span>
                <span id="timer" class="hud-value">00:00</span>
            </div>
        </div>

        <div id="boss-hud" class="boss-hud" style="display: none;">
            <div class="boss-info">
                <span id="boss-name" class="boss-name">ARCONTE VOX</span>
                <div class="boss-hp-container">
                    <div id="boss-hp-bar" class="boss-hp-bar"></div>
                </div>
            </div>
        </div>

        <button id="menu-btn" class="menu-btn" aria-label="Abrir menu" style="display: none;">
            <span>☰</span>
        </button>

        <div id="game-menu" class="game-menu" style="display: none;">
            <div class="menu-overlay"></div>
            <div class="menu-content">
                <h3 class="menu-title">Menu</h3>
                <button id="menu-home-btn" class="menu-option-btn">
                    <span class="btn-text">🏠 Voltar para Tela Inicial</span>
                </button>
                <button id="menu-cancel-btn" class="menu-option-btn menu-cancel">
                    <span class="btn-text">Cancelar</span>
                </button>
            </div>
        </div>

        <div id="game-area" class="game-area" role="main" aria-label="Área de jogo">
            <div id="start-screen" class="screen">
                <div class="screen-content">
                    <h2 class="screen-title">Bem-vindo, Operador</h2>
                    <p class="screen-text">ORION detectou instabilidades no Nexus Prism.</p>
                    <p class="screen-text">Estabilize as fendas de energia antes que desestabilizem o sistema.</p>
                    <button id="start-btn" class="btn-primary" aria-label="Iniciar jogo">
                        <span class="btn-text">Iniciar Missão</span>
                    </button>
                </div>
            </div>

            <div id="target" class="target" role="button" aria-label="Fenda de energia" tabindex="0" style="display: none;">
                <svg class="target-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <circle class="outer-ring" cx="50" cy="50" r="45" fill="none" stroke="currentColor" stroke-width="2"/>
                    <circle class="core" cx="50" cy="50" r="15" fill="currentColor"/>
                    <circle class="particle" cx="50" cy="50" r="3" fill="currentColor"/>
                </svg>
            </div>

            <!-- Container estático de power-ups (fallback para testes) -->
            <div id="powerup-container" style="position:absolute;bottom:1rem;left:1rem;z-index:50;display:flex;flex-direction:column;gap:0.5rem;pointer-events:none;"></div>

            <div id="game-over-screen" class="screen" style="display: none;">
                <div class="screen-content">
                    <h2 class="screen-title" id="game-over-title">Setor Desestabilizado</h2>
                    <p class="screen-text">Energia acumulada: <span id="final-score">0</span></p>
                    <div class="button-group">
                        <button id="restart-btn" class="btn-primary" aria-label="Tentar novamente">
                            <span class="btn-text">Tentar Novamente</span>
                        </button>
                        <button id="leaderboard-btn" class="btn-secondary" aria-label="Ver ranking">
                            <span class="btn-text">Ranking</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div id="leaderboard-screen" class="screen" style="display: none;">
            <div class="screen-content">
                <h2 class="screen-title">Ranking Global</h2>
                <div class="leaderboard-filters">
                    <button class="filter-btn active" data-mode="daily">Dia</button>
                    <button class="filter-btn" data-mode="weekly">Semana</button>
                    <button class="filter-btn" data-mode="total">Total</button>
                </div>
                <div id="leaderboard-list" class="leaderboard-list"></div>
                <button id="close-leaderboard-btn" class="btn-secondary">Voltar</button>
            </div>
        </div>

        <div id="achievements-screen" class="screen" style="display: none;">
            <div class="screen-content">
                <h2 class="screen-title">🏆 Conquistas</h2>
                <div id="achievements-stats" class="achievements-stats"></div>
                <div id="achievements-list" class="achievements-list"></div>
                <button id="close-achievements-btn" class="btn-secondary">Voltar</button>
            </div>
        </div>
    </div>

    <script type="module" src="game.js"></script>
    <script>
        // Tratamento de erro caso módulos não carreguem
        window.addEventListener('error', function(e) {
            if (e.message && e.message.includes('module')) {
                console.error('Erro ao carregar módulos:', e);
                alert('ERRO: Este jogo precisa ser executado em um servidor local.\n\nUse: python -m http.server 8000\nDepois acesse: http://localhost:8000');
            }
        });
        // Fallback para stylesheet: se style.css não carregar (connection refused), tenta buscar via fetch e injetar
        (function(){
            const link = document.querySelector('link[rel=stylesheet][href="style.css"]');
            if (!link) return;
            // se já carregou sem erros, nada a fazer
            let loaded = false;
            link.addEventListener('load', ()=>{ loaded = true; });
            link.addEventListener('error', async ()=>{
                console.warn('style.css falhou ao carregar — tentando fetch fallback');
                try {
                    const resp = await fetch('style.css');
                    if (!resp.ok) throw new Error('fetch fail');
                    const css = await resp.text();
                    const s = document.createElement('style');
                    s.textContent = css;
                    document.head.appendChild(s);
                    console.info('style.css injetado via fetch fallback');
                } catch (err) {
                    console.warn('fetch de style.css falhou — aplicando CSS mínimo de fallback');
                    const s = document.createElement('style');
                    s.textContent = '\nbody{background:#08101a;color:#fff}\n.game-container{padding:1rem}\n.game-title{font-size:1.5rem}\n.game-area{min-height:300px;background:#0b1220}\n';
                    document.head.appendChild(s);
                }
            });
            // também tenta detectar se o stylesheet está bloqueado por CORS/port mismatch
            setTimeout(()=>{
                if (!loaded && document.styleSheets.length===0) {
                    // força o evento error flow
                    link.dispatchEvent(new Event('error'));
                }
            }, 800);
        })();
    </script>
</body>
</html>
