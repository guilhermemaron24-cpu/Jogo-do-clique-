<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executar Testes - Nexus Prism</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Courier New', monospace;
            background: #0a0e1a;
            color: #00f0ff;
            padding: 2rem;
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            margin-bottom: 2rem;
            text-shadow: 0 0 10px #00f0ff;
        }
        .test-panel {
            background: rgba(26, 31, 46, 0.9);
            border: 2px solid #00f0ff;
            border-radius: 8px;
            padding: 2rem;
            margin-bottom: 2rem;
        }
        .status {
            padding: 1rem;
            border-radius: 4px;
            margin: 1rem 0;
        }
        .status.running {
            background: rgba(255, 215, 0, 0.2);
            border: 1px solid #ffd700;
        }
        .status.success {
            background: rgba(0, 255, 0, 0.2);
            border: 1px solid #00ff00;
        }
        .status.error {
            background: rgba(255, 0, 0, 0.2);
            border: 1px solid #ff0000;
        }
        .test-item {
            padding: 0.5rem;
            margin: 0.5rem 0;
            border-left: 3px solid #00f0ff;
            padding-left: 1rem;
        }
        .test-item.pass {
            border-color: #00ff00;
            color: #00ff00;
        }
        .test-item.fail {
            border-color: #ff0000;
            color: #ff0000;
        }
        .test-item.warn {
            border-color: #ffaa00;
            color: #ffaa00;
        }
        .test-item.bug {
            border-color: #ff00ff;
            color: #ff00ff;
        }
        .summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin: 2rem 0;
        }
        .summary-card {
            background: rgba(0, 0, 0, 0.3);
            padding: 1.5rem;
            border-radius: 8px;
            text-align: center;
        }
        .summary-card h3 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        pre {
            background: rgba(0, 0, 0, 0.5);
            padding: 1rem;
            border-radius: 4px;
            overflow-x: auto;
            max-height: 400px;
            overflow-y: auto;
        }
        button {
            background: linear-gradient(135deg, #00f0ff, #ff00f0);
            color: white;
            border: none;
            padding: 1rem 2rem;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            margin: 0.5rem;
            text-transform: uppercase;
        }
        button:hover {
            transform: scale(1.05);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 Executar Testes Automatizados</h1>
        
        <div class="test-panel">
            <button id="runTestsBtn" onclick="runTests()">▶️ Executar Todos os Testes</button>
            <button onclick="clearResults()">🗑️ Limpar Resultados</button>
        </div>
        
        <div id="status" class="status" style="display: none;"></div>
        
        <div id="summary" class="summary" style="display: none;"></div>
        
        <div id="results" class="test-panel" style="display: none;">
            <h2>Resultados Detalhados</h2>
            <div id="resultsContent"></div>
        </div>
    </div>
    
    <script type="module">
        import { runAllTests, getTestResults } from './gameTester.js';
        
        window.runTests = async function() {
            const btn = document.getElementById('runTestsBtn');
            const statusDiv = document.getElementById('status');
            const resultsDiv = document.getElementById('results');
            const resultsContent = document.getElementById('resultsContent');
            const summaryDiv = document.getElementById('summary');
            
            btn.disabled = true;
            statusDiv.style.display = 'block';
            statusDiv.className = 'status running';
            statusDiv.innerHTML = '🔄 Executando testes... Por favor, aguarde.';
            
            resultsDiv.style.display = 'none';
            summaryDiv.style.display = 'none';
            
            try {
                // Executa os testes
                const results = await runAllTests();
                
                // Atualiza status
                statusDiv.className = 'status success';
                statusDiv.innerHTML = '✅ Testes concluídos!';
                
                // Mostra resumo
                summaryDiv.style.display = 'grid';
                summaryDiv.innerHTML = `
                    <div class="summary-card">
                        <h3 style="color: #00ff00;">${results.passed.length}</h3>
                        <p>Testes Passaram</p>
                    </div>
                    <div class="summary-card">
                        <h3 style="color: #ff0000;">${results.failed.length}</h3>
                        <p>Testes Falharam</p>
                    </div>
                    <div class="summary-card">
                        <h3 style="color: #ffaa00;">${results.warnings.length}</h3>
                        <p>Avisos</p>
                    </div>
                    <div class="summary-card">
                        <h3 style="color: #ff00ff;">${results.bugs.length}</h3>
                        <p>Bugs Encontrados</p>
                    </div>
                `;
                
                // Mostra resultados detalhados
                let html = '';
                
                if (results.passed.length > 0) {
                    html += '<h3 style="color: #00ff00;">✅ Testes que Passaram:</h3>';
                    results.passed.forEach((test, index) => {
                        html += `<div class="test-item pass">${index + 1}. ${test.test}: ${test.message || 'OK'}</div>`;
                    });
                }
                
                if (results.failed.length > 0) {
                    html += '<h3 style="color: #ff0000; margin-top: 2rem;">❌ Testes que Falharam:</h3>';
                    results.failed.forEach((test, index) => {
                        html += `<div class="test-item fail">${index + 1}. ${test.test}: ${test.issue}</div>`;
                        if (test.threshold !== undefined) {
                            html += `<div style="margin-left: 2rem; color: #888;">Threshold: ${test.threshold}</div>`;
                        }
                    });
                }
                
                if (results.warnings.length > 0) {
                    html += '<h3 style="color: #ffaa00; margin-top: 2rem;">⚠️ Avisos:</h3>';
                    results.warnings.forEach((test, index) => {
                        html += `<div class="test-item warn">${index + 1}. ${test.test}: ${test.issue}</div>`;
                        if (test.value !== undefined) {
                            html += `<div style="margin-left: 2rem; color: #888;">Valor: ${test.value}</div>`;
                        }
                    });
                }
                
                if (results.bugs.length > 0) {
                    html += '<h3 style="color: #ff00ff; margin-top: 2rem;">🐛 Bugs Encontrados:</h3>';
                    results.bugs.forEach((test, index) => {
                        html += `<div class="test-item bug">${index + 1}. ${test.test}: ${test.issue}</div>`;
                        if (test.value !== undefined) {
                            html += `<div style="margin-left: 2rem; color: #888;">Valor: ${test.value}</div>`;
                        }
                        if (test.scoreBefore !== undefined) {
                            html += `<div style="margin-left: 2rem; color: #888;">Score antes: ${test.scoreBefore}, depois: ${test.scoreAfter}</div>`;
                        }
                    });
                }
                
                if (html === '') {
                    html = '<p>Nenhum resultado para exibir.</p>';
                }
                
                resultsContent.innerHTML = html;
                resultsDiv.style.display = 'block';
                
                // Scroll para resultados
                resultsDiv.scrollIntoView({ behavior: 'smooth' });
                
            } catch (error) {
                statusDiv.className = 'status error';
                statusDiv.innerHTML = `❌ Erro ao executar testes: ${error.message}`;
                console.error('Erro:', error);
            } finally {
                btn.disabled = false;
            }
        };
        
        window.clearResults = function() {
            document.getElementById('status').style.display = 'none';
            document.getElementById('results').style.display = 'none';
            document.getElementById('summary').style.display = 'none';
            document.getElementById('resultsContent').innerHTML = '';
        };
        
        // Executa automaticamente ao carregar
        window.addEventListener('load', () => {
            console.log('✅ Página de testes carregada. Clique em "Executar Todos os Testes" para começar.');
        });
    </script>
</body>
</html>
