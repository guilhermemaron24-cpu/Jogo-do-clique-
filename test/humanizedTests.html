<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testes Humanizados - Nexus Prism</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        #test-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.3);
            pointer-events: none;
            z-index: 1000;
        }
        
        #test-console {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 400px;
            height: 300px;
            background: #0a0e1a;
            border: 2px solid #00f0ff;
            border-radius: 8px;
            padding: 12px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            overflow-y: auto;
            z-index: 999;
            color: #00f0ff;
        }
        
        #test-console .log { color: #00f0ff; }
        #test-console .success { color: #00ff00; }
        #test-console .error { color: #ff0000; }
        #test-console .warn { color: #ffaa00; }
        #test-console .bug { color: #ff00ff; }
        
        .test-message {
            margin: 4px 0;
            white-space: pre-wrap;
            word-break: break-word;
        }
        
        .test-summary {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #00f0ff;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="test-overlay"></div>
    <div id="test-console">
        <div id="console-output"></div>
    </div>

    <script type="module">
        const consoleOutput = document.getElementById('console-output');
        const testOverlay = document.getElementById('test-overlay');
        
        // Redirect console.log to test console
        const originalLog = console.log;
        const originalError = console.error;
        
        function addLog(text, className = 'log') {
            const el = document.createElement('div');
            el.className = `test-message ${className}`;
            el.textContent = text;
            consoleOutput.appendChild(el);
            consoleOutput.scrollTop = consoleOutput.scrollHeight;
        }
        
        console.log = function(...args) {
            originalLog(...args);
            addLog(args.join(' '), 'log');
        };
        
        console.error = function(...args) {
            originalError(...args);
            addLog(args.join(' '), 'error');
        };
        
        window.logBug = (title, desc, severity) => {
            addLog(`🐛 BUG [${severity}]: ${title}`, 'bug');
            addLog(`   ${desc}`, 'bug');
        };
        
        window.logError = (title, desc) => {
            addLog(`❌ ERROR: ${title}`, 'error');
            addLog(`   ${desc}`, 'error');
        };
        
        window.logWarning = (title, desc) => {
            addLog(`⚠️ WARNING: ${title}`, 'warn');
            addLog(`   ${desc}`, 'warn');
        };
        
        window.logPass = (title) => {
            addLog(`✅ PASS: ${title}`, 'success');
        };
        
        // Import and run tests
        import('./humanizedTester.js').then(module => {
            console.log('✅ Testes humanizados carregados e iniciados...');
        }).catch(err => {
            console.error('Erro ao carregar testes:', err);
            addLog('Erro ao carregar módulo de testes: ' + err.message, 'error');
        });
    </script>
</body>
</html>
